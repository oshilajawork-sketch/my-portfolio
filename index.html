<!DOCTYPE html>
<html lang="en">

<title>My Portfolio</title>

<style>

}

body{
    background:#0f172a;

}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 10%;

.logo{

    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
    gap:20px;
}

    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;

}

.hero h1{
    font-size:60px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    color:#cbd5e1;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;

<body>

<nav>
